<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Countdown &mdash; yaeesh.dev</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0c0c0b;
      --surface:     #141311;
      --border:      #252220;
      --text:        #ede9e3;
      --text-sub:    #8a7e74;
      --text-muted:  #4e4440;
      --amber:       #c8913c;
    }

    html { height: 100%; }

    body {
      position: relative;
      min-height: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Header — floats over hero so centering is y=0 to bottom bar ── */

    .header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 1.5rem 2rem;
      z-index: 10;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      text-decoration: none;
      pointer-events: auto;
      transition: color 0.15s;
    }
    .logo:hover { color: var(--text-sub); }

    .kbd-hint {
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      opacity: 0.7;
    }

    /* ── Hero — takes full column above bottom bar, true centering ─── */

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 2rem; /* equal top/bottom = no centering offset */
    }

    .main-wrap {
      text-align: center;
      transition: opacity 0.2s ease;
    }
    .main-wrap.exit { opacity: 0; }

    /* ── Exam label & date ───────────────────────────────────────────── */

    .exam-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 0.35rem;
    }

    .exam-date {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
      margin-bottom: clamp(2rem, 5vh, 4.5rem);
    }

    /* ── Digits ──────────────────────────────────────────────────────── */

    .digits-row {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: clamp(1rem, 3.5vw, 3rem);
    }

    .digit-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
    }

    .digit-num {
      /* Bigger than before — was clamp(3.2rem, 13vw, 9.5rem) */
      font-size: clamp(3.8rem, 16vw, 12.5rem);
      font-weight: 700;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', ui-monospace, Consolas, monospace;
      line-height: 0.88;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.045em;
      display: block;
    }

    .digit-label {
      /* More visible — was text-muted, tiny, light weight */
      font-size: clamp(0.62rem, 1.1vw, 0.78rem);
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-sub);
      line-height: 1;
    }

    /* ── Bottom bar — all 3 exams ────────────────────────────────────── */

    .bottom {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .bottom::-webkit-scrollbar { display: none; }
    .bottom:empty { display: none; }

    .exam-card {
      flex: 1;
      min-width: 150px;
      padding: 1rem 1.5rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      outline: none;
      transition: background 0.15s;
      box-shadow: none;
    }
    .exam-card + .exam-card { border-left: 1px solid var(--border); }

    .exam-card.active      { box-shadow: inset 0 2px 0 var(--amber); }
    .exam-card:not(.active):hover { background: rgba(255,255,255,0.02); }
    .exam-card:focus-visible      { background: rgba(255,255,255,0.03); outline: 1px solid var(--border); }
    .exam-card:active             { background: rgba(255,255,255,0.01); }

    .card-name {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--text-sub);
      transition: color 0.15s;
    }
    .exam-card.active .card-name { color: var(--amber); }

    .card-time {
      font-size: 0.8rem;
      font-family: 'SF Mono', 'Cascadia Code', ui-monospace, Consolas, monospace;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
    }

    .card-date {
      font-size: 0.63rem;
      color: var(--text-muted);
      margin-top: 0.05rem;
    }

    /* ── All done ────────────────────────────────────────────────────── */

    .all-done {
      text-align: center;
      max-width: 280px;
    }
    .all-done h2 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      margin-bottom: 0.5rem;
    }
    .all-done p { font-size: 0.875rem; color: var(--text-sub); line-height: 1.65; }

    /* ── Responsive ──────────────────────────────────────────────────── */

    @media (max-width: 500px) {
      .header    { padding: 1.1rem 1.25rem; }
      .hero      { padding: 1rem; }
      .exam-card { min-width: 130px; padding: 0.9rem 1.1rem; }
      .kbd-hint  { display: none; }
    }
  </style>
</head>
<body>

<header class="header">
  <a href="/" class="logo">yaeesh.dev</a>
  <span class="kbd-hint" aria-hidden="true">F &mdash; fullscreen</span>
</header>

<main class="hero">
  <div class="main-wrap" id="mainWrap"></div>
</main>

<div class="bottom" id="bottomBar"></div>

<script>
(function () {
  'use strict';

  /* ── Data ────────────────────────────────────────────────────── */
  // All times MVT (UTC+5). utcMs = MVT − 5 h.

  var EXAMS = [
    { id: 'term-test',  name: 'Term Test',      utcMs: Date.UTC(2026, 5, 30, 2, 10, 0), display: '30 Jun 2026 · 7:10 AM MVT'  },
    { id: 'mock-exams', name: 'Mock Exams',     utcMs: Date.UTC(2026, 8,  1, 4, 30, 0), display: '1 Sep 2026 · 9:30 AM MVT'   },
    { id: 'o-level',    name: 'O‑Level & SSE', utcMs: Date.UTC(2026, 8, 20, 4, 30, 0), display: '20 Sep 2026 · 9:30 AM MVT' },
  ];

  var DEFAULT_ID  = 'o-level';
  var STORAGE_KEY = 'exam-countdown-selected';

  /* ── State ───────────────────────────────────────────────────── */

  var selectedId    = null;
  var transitioning = false;
  var timer         = null;

  /* ── Utils ───────────────────────────────────────────────────── */

  function esc(s) {
    return s
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;');
  }

  function getActive() {
    var now = Date.now();
    return EXAMS.filter(function (e) { return e.utcMs > now; });
  }

  function resolveId(active) {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved && active.some(function (e) { return e.id === saved; })) return saved;
    } catch (_) {}
    var def = active.filter(function (e) { return e.id === DEFAULT_ID; })[0];
    if (def) return def.id;
    return active[0] ? active[0].id : null;
  }

  function saveId(id) { try { localStorage.setItem(STORAGE_KEY, id); } catch (_) {} }

  function pad2(n) { return n < 10 ? '0' + n : '' + n; }

  function calcCd(utcMs) {
    var diff = utcMs - Date.now();
    if (diff <= 0) return null;
    var s = Math.floor(diff / 1000);
    var m = Math.floor(s / 60);
    var h = Math.floor(m / 60);
    var d = Math.floor(h / 24);
    return { d: d, h: h % 24, m: m % 60, s: s % 60 };
  }

  function compact(utcMs) {
    var cd = calcCd(utcMs);
    if (!cd) return '—';
    if (cd.d > 0) return cd.d + 'd ' + pad2(cd.h) + 'h ' + pad2(cd.m) + 'm ' + pad2(cd.s) + 's';
    if (cd.h > 0) return cd.h + 'h ' + pad2(cd.m) + 'm ' + pad2(cd.s) + 's';
    return cd.m + 'm ' + pad2(cd.s) + 's';
  }

  /* ── Render: main ────────────────────────────────────────────── */

  function mainHTML(exam) {
    var cd = calcCd(exam.utcMs) || { d: 0, h: 0, m: 0, s: 0 };
    return (
      '<p class="exam-label">' + esc(exam.name) + '</p>' +
      '<p class="exam-date">'  + esc(exam.display) + '</p>' +
      '<div class="digits-row" role="timer" aria-label="' + esc(exam.name) + ' countdown">' +
        '<div class="digit-unit"><span class="digit-num" id="d-d">' + pad2(cd.d) + '</span><span class="digit-label">Days</span></div>'  +
        '<div class="digit-unit"><span class="digit-num" id="d-h">' + pad2(cd.h) + '</span><span class="digit-label">Hours</span></div>' +
        '<div class="digit-unit"><span class="digit-num" id="d-m">' + pad2(cd.m) + '</span><span class="digit-label">Min</span></div>'   +
        '<div class="digit-unit"><span class="digit-num" id="d-s">' + pad2(cd.s) + '</span><span class="digit-label">Sec</span></div>'   +
      '</div>'
    );
  }

  function renderMain(exam, animate) {
    var wrap = document.getElementById('mainWrap');

    if (!exam) {
      wrap.innerHTML =
        '<div class="all-done"><h2>All done.</h2>' +
        '<p>Every exam has passed. Good luck with your results.</p></div>';
      return;
    }

    if (!animate) { wrap.innerHTML = mainHTML(exam); return; }

    transitioning = true;
    wrap.classList.add('exit');
    setTimeout(function () {
      wrap.innerHTML = mainHTML(exam);
      wrap.classList.remove('exit');
      setTimeout(function () { transitioning = false; }, 220);
    }, 200);
  }

  /* ── Render: bottom bar ──────────────────────────────────────── */

  function renderBottom(active) {
    var bar = document.getElementById('bottomBar');
    if (!active.length) { bar.innerHTML = ''; return; }

    bar.innerHTML = active.map(function (e) {
      var isActive = e.id === selectedId;
      return (
        '<div class="exam-card' + (isActive ? ' active' : '') + '"' +
            ' data-id="' + e.id + '" role="button" tabindex="0"' +
            ' aria-label="' + esc(e.name) + (isActive ? ', currently selected' : '') + '">' +
          '<span class="card-name">'                       + esc(e.name)    + '</span>' +
          '<span class="card-time" id="c-' + e.id + '">'  + compact(e.utcMs) + '</span>' +
          '<span class="card-date">'                       + esc(e.display) + '</span>' +
        '</div>'
      );
    }).join('');

    bar.querySelectorAll('.exam-card').forEach(function (card) {
      card.addEventListener('click', function () { switchTo(card.dataset.id); });
      card.addEventListener('keydown', function (ev) {
        if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); switchTo(card.dataset.id); }
      });
    });
  }

  /* ── Switch ──────────────────────────────────────────────────── */

  function switchTo(id) {
    if (transitioning || id === selectedId) return;
    var active = getActive();
    var exam   = active.filter(function (e) { return e.id === id; })[0];
    if (!exam) return;
    selectedId = id;
    saveId(id);
    renderMain(exam, true);
    renderBottom(active);
  }

  /* ── Tick ────────────────────────────────────────────────────── */

  function tick() {
    var active = getActive();

    if (!active.length) {
      clearInterval(timer); timer = null;
      renderMain(null, false);
      document.getElementById('bottomBar').innerHTML = '';
      return;
    }

    if (!active.some(function (e) { return e.id === selectedId; })) {
      selectedId = resolveId(active); saveId(selectedId);
      renderMain(active.filter(function (e) { return e.id === selectedId; })[0], false);
      renderBottom(active);
      return;
    }

    // Fast-path digit update
    if (!transitioning) {
      var curr = active.filter(function (e) { return e.id === selectedId; })[0];
      var cd   = calcCd(curr.utcMs);
      var dEl  = document.getElementById('d-d');
      if (dEl && cd) {
        dEl.textContent                             = pad2(cd.d);
        document.getElementById('d-h').textContent = pad2(cd.h);
        document.getElementById('d-m').textContent = pad2(cd.m);
        document.getElementById('d-s').textContent = pad2(cd.s);
      }
    }

    // Update card times; re-render if an exam expired
    var curIds = Array.prototype.map.call(
      document.querySelectorAll('.exam-card'),
      function (c) { return c.dataset.id; }
    );
    var expIds = active.map(function (e) { return e.id; });
    if (curIds.join(',') !== expIds.join(',')) {
      renderBottom(active);
    } else {
      active.forEach(function (e) {
        var el = document.getElementById('c-' + e.id);
        if (el) el.textContent = compact(e.utcMs);
      });
    }
  }

  /* ── Fullscreen (F key) ──────────────────────────────────────── */

  document.addEventListener('keydown', function (e) {
    // Don't intercept Ctrl/Cmd+F (browser find) or modified combos
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.key !== 'f' && e.key !== 'F') return;
    try {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.documentElement.requestFullscreen();
      }
    } catch (_) {}
  });

  /* ── Init ────────────────────────────────────────────────────── */

  function init() {
    var active = getActive();
    if (!active.length) { renderMain(null, false); return; }
    selectedId = resolveId(active); saveId(selectedId);
    renderMain(active.filter(function (e) { return e.id === selectedId; })[0], false);
    renderBottom(active);
    timer = setInterval(tick, 1000);
  }

  init();
}());
</script>

</body>
</html>
