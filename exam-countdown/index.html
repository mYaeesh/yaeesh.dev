<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Countdown &mdash; yaeesh.dev</title>
  <meta name="description" content="Countdown to upcoming exams">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:             #080d1a;
      --surface:        #111b2e;
      --surface-hover:  #172036;
      --border:         #1c2b44;
      --border-mid:     #253a58;
      --text:           #e2e8f0;
      --text-sub:       #94a3b8;
      --text-muted:     #4e6278;
      --teal:           #2dd4bf;
      --blue:           #60a5fa;
      --amber:          #f59e0b;
      --radius-lg:      14px;
      --radius-md:      10px;
    }

    html { height: 100%; }

    body {
      min-height: 100%;
      min-height: 100dvh;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 90% 55% at 50% -5%,  rgba(45,212,191,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 55% 45% at 85% 90%,  rgba(96,165,250,0.06) 0%, transparent 60%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────────────── */

    .header {
      padding: 1.375rem 2rem;
      flex-shrink: 0;
    }

    .logo {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.18s;
    }
    .logo:hover { color: var(--text-sub); }

    /* ── Hero ────────────────────────────────────────────────── */

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 3rem;
    }

    /* ── Main countdown wrapper (animated on switch) ─────────── */

    .main-wrap {
      text-align: center;
      transition: opacity 0.28s ease, transform 0.28s ease;
    }
    .main-wrap.exit {
      opacity: 0;
      transform: translateY(-10px);
    }

    /* ── Tag ─────────────────────────────────────────────────── */

    .tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--amber);
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.18);
      border-radius: 999px;
      padding: 0.28em 1em;
      margin-bottom: 1.4rem;
    }

    /* ── Exam heading ────────────────────────────────────────── */

    .exam-name {
      font-size: clamp(2rem, 6vw, 4.25rem);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 0.45rem;
    }

    .exam-date {
      font-size: 0.875rem;
      color: var(--text-muted);
      letter-spacing: 0.01em;
      margin-bottom: 3rem;
    }

    /* ── Digit row ───────────────────────────────────────────── */

    .digits-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(0.35rem, 1.5vw, 0.7rem);
    }

    .digit-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: clamp(72px, 14.5vw, 120px);
      padding: 1.1rem 0.4rem 0.85rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
      /* inner top glow */
      box-shadow:
        inset 0 1px 0 rgba(45,212,191,0.18),
        0 2px 20px rgba(0,0,0,0.35);
    }

    .digit-num {
      font-size: clamp(1.85rem, 4.2vw, 3.75rem);
      font-weight: 700;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', ui-monospace, Consolas, monospace;
      background: linear-gradient(145deg, var(--teal) 0%, var(--blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      letter-spacing: -0.03em;
      min-width: 2ch;
      text-align: center;
    }

    .digit-label {
      font-size: clamp(0.55rem, 1.1vw, 0.68rem);
      font-weight: 500;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--text-muted);
      line-height: 1;
    }

    .digit-sep {
      font-size: clamp(1.4rem, 3.2vw, 2.7rem);
      font-weight: 700;
      color: var(--border-mid);
      line-height: 1;
      flex-shrink: 0;
      /* nudge up so the colon sits closer to the number
         (box = padding + number + gap + label + padding;
         number centre is ~0.44rem above the box centre) */
      margin-top: -0.9rem;
    }

    /* ── Mini bar ────────────────────────────────────────────── */

    .mini-bar {
      flex-shrink: 0;
      padding: 1rem 1.5rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .mini-bar:empty { display: none; }

    .mini-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.7rem 1.1rem;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, transform 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.18rem;
      min-width: 185px;
      outline: none;
      text-align: left;
    }
    .mini-card:hover {
      background: var(--surface-hover);
      border-color: rgba(96,165,250,0.3);
      transform: translateY(-1px);
    }
    .mini-card:focus-visible {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(96,165,250,0.18);
    }
    .mini-card:active { transform: translateY(0); }

    .mini-name {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-sub);
    }
    .mini-time {
      font-size: 0.83rem;
      font-family: 'SF Mono', 'Cascadia Code', ui-monospace, Consolas, monospace;
      color: var(--blue);
      letter-spacing: 0.02em;
    }
    .mini-when {
      font-size: 0.67rem;
      color: var(--text-muted);
      margin-top: 0.08rem;
    }

    /* ── All-done state ──────────────────────────────────────── */

    .all-done {
      text-align: center;
      max-width: 300px;
    }
    .done-icon {
      width: 54px;
      height: 54px;
      margin: 0 auto 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .done-icon svg {
      width: 22px;
      height: 22px;
      stroke: var(--teal);
    }
    .all-done h2 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .all-done p {
      font-size: 0.875rem;
      color: var(--text-sub);
      line-height: 1.6;
    }

    /* ── Responsive ──────────────────────────────────────────── */

    @media (max-width: 520px) {
      .header  { padding: 1rem 1.25rem; }
      .hero    { padding: 1.5rem 1rem 2.5rem; }
      .exam-date { margin-bottom: 2.25rem; }
      .mini-bar { padding: 0.85rem 1rem 1.25rem; gap: 0.6rem; }
      .mini-card { min-width: calc(50% - 0.3rem); flex: 1; }
    }

    @media (max-width: 340px) {
      .digits-row { gap: 0.2rem; }
      .mini-card  { min-width: 100%; }
    }
  </style>
</head>
<body>

<header class="header">
  <a href="/" class="logo">yaeesh.dev</a>
</header>

<main class="hero">
  <div class="main-wrap" id="mainWrap"></div>
</main>

<div class="mini-bar" id="miniBar"></div>

<script>
(function () {
  'use strict';

  /* ── Data ───────────────────────────────────────────────────────────────── */

  // All times in MVT (UTC+5). UTC = MVT - 5h.
  var EXAMS = [
    {
      id:      'term-test',
      name:    'Term Test',
      utcMs:   Date.UTC(2026, 5, 30, 2, 10, 0),   // 30 Jun 2026 07:10 MVT
      display: '30 Jun 2026 · 7:10 AM MVT',
    },
    {
      id:      'mock-exams',
      name:    'Mock Exams',
      utcMs:   Date.UTC(2026, 8, 1, 4, 30, 0),    // 1 Sep 2026 09:30 MVT
      display: '1 Sep 2026 · 9:30 AM MVT',
    },
    {
      id:      'o-level',
      name:    'O-Level &amp; SSE',
      rawName: 'O-Level & SSE',                    // for aria-label / aria use
      utcMs:   Date.UTC(2026, 8, 20, 4, 30, 0),   // 20 Sep 2026 09:30 MVT
      display: '20 Sep 2026 · 9:30 AM MVT',
    },
  ];

  var DEFAULT_ID  = 'o-level';
  var STORAGE_KEY = 'exam-countdown-selected';

  /* ── State ──────────────────────────────────────────────────────────────── */

  var selectedId   = null;
  var transitioning = false;
  var timer        = null;

  /* ── Utilities ──────────────────────────────────────────────────────────── */

  function getActive() {
    var now = Date.now();
    return EXAMS.filter(function (e) { return e.utcMs > now; });
  }

  function resolveId(active) {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved && active.some(function (e) { return e.id === saved; })) return saved;
    } catch (_) {}
    var def = active.filter(function (e) { return e.id === DEFAULT_ID; })[0];
    if (def) return def.id;
    return active[0] ? active[0].id : null;
  }

  function saveId(id) {
    try { localStorage.setItem(STORAGE_KEY, id); } catch (_) {}
  }

  function pad2(n) { return n < 10 ? '0' + n : '' + n; }

  function calcCd(utcMs) {
    var diff = utcMs - Date.now();
    if (diff <= 0) return null;
    var totalSec = Math.floor(diff / 1000);
    var totalMin = Math.floor(totalSec / 60);
    var totalHr  = Math.floor(totalMin / 60);
    var d = Math.floor(totalHr / 24);
    return { d: d, h: totalHr % 24, m: totalMin % 60, s: totalSec % 60 };
  }

  function compact(utcMs) {
    var cd = calcCd(utcMs);
    if (!cd) return '—';
    if (cd.d > 0) return cd.d + 'd ' + pad2(cd.h) + 'h ' + pad2(cd.m) + 'm ' + pad2(cd.s) + 's';
    if (cd.h > 0) return cd.h + 'h ' + pad2(cd.m) + 'm ' + pad2(cd.s) + 's';
    return cd.m + 'm ' + pad2(cd.s) + 's';
  }

  function labelOf(exam) {
    return exam.rawName || exam.name;
  }

  /* ── Render: main ───────────────────────────────────────────────────────── */

  function mainHTML(exam) {
    var cd = calcCd(exam.utcMs) || { d: 0, h: 0, m: 0, s: 0 };
    var sep = '<span class="digit-sep" aria-hidden="true">:</span>';
    return (
      '<div class="tag">Countdown</div>' +
      '<h1 class="exam-name">' + exam.name + '</h1>' +
      '<p class="exam-date">' + exam.display + '</p>' +
      '<div class="digits-row" role="timer" aria-live="off" aria-label="' + labelOf(exam) + ' countdown">' +
        '<div class="digit-box"><span class="digit-num" id="d-d">' + pad2(cd.d) + '</span><span class="digit-label">Days</span></div>' +
        sep +
        '<div class="digit-box"><span class="digit-num" id="d-h">' + pad2(cd.h) + '</span><span class="digit-label">Hours</span></div>' +
        sep +
        '<div class="digit-box"><span class="digit-num" id="d-m">' + pad2(cd.m) + '</span><span class="digit-label">Min</span></div>' +
        sep +
        '<div class="digit-box"><span class="digit-num" id="d-s">' + pad2(cd.s) + '</span><span class="digit-label">Sec</span></div>' +
      '</div>'
    );
  }

  function renderMain(exam, animate) {
    var wrap = document.getElementById('mainWrap');

    if (!exam) {
      wrap.innerHTML =
        '<div class="all-done">' +
          '<div class="done-icon">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
              '<path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>' +
            '</svg>' +
          '</div>' +
          '<h2>All done!</h2>' +
          '<p>All exams have passed. Good luck with your results.</p>' +
        '</div>';
      return;
    }

    if (!animate) {
      wrap.innerHTML = mainHTML(exam);
      return;
    }

    transitioning = true;
    wrap.classList.add('exit');

    setTimeout(function () {
      wrap.innerHTML = mainHTML(exam);
      wrap.classList.remove('exit');
      setTimeout(function () { transitioning = false; }, 300);
    }, 280);
  }

  /* ── Render: minis ──────────────────────────────────────────────────────── */

  function renderMinis(active) {
    var bar    = document.getElementById('miniBar');
    var others = active.filter(function (e) { return e.id !== selectedId; });

    if (!others.length) {
      bar.innerHTML = '';
      return;
    }

    bar.innerHTML = others.map(function (e) {
      return (
        '<div class="mini-card" data-id="' + e.id + '" role="button" tabindex="0"' +
            ' aria-label="Switch to ' + labelOf(e) + ' countdown">' +
          '<span class="mini-name">' + e.name + '</span>' +
          '<span class="mini-time" id="m-' + e.id + '">' + compact(e.utcMs) + '</span>' +
          '<span class="mini-when">' + e.display + '</span>' +
        '</div>'
      );
    }).join('');

    bar.querySelectorAll('.mini-card').forEach(function (card) {
      card.addEventListener('click', function () { switchTo(card.dataset.id); });
      card.addEventListener('keydown', function (ev) {
        if (ev.key === 'Enter' || ev.key === ' ') {
          ev.preventDefault();
          switchTo(card.dataset.id);
        }
      });
    });
  }

  /* ── Switch ─────────────────────────────────────────────────────────────── */

  function switchTo(id) {
    if (transitioning || id === selectedId) return;
    var active = getActive();
    var exam   = active.filter(function (e) { return e.id === id; })[0];
    if (!exam) return;
    selectedId = id;
    saveId(id);
    renderMain(exam, true);
    renderMinis(active);
  }

  /* ── Tick ───────────────────────────────────────────────────────────────── */

  function tick() {
    var active = getActive();

    // All exams expired
    if (!active.length) {
      clearInterval(timer);
      timer = null;
      renderMain(null, false);
      document.getElementById('miniBar').innerHTML = '';
      return;
    }

    // Currently-selected exam just expired — pick next
    if (!active.some(function (e) { return e.id === selectedId; })) {
      selectedId = resolveId(active);
      saveId(selectedId);
      var next = active.filter(function (e) { return e.id === selectedId; })[0];
      renderMain(next, false);
      renderMinis(active);
      return;
    }

    // Fast-path: update digits in place (skip during transition)
    if (!transitioning) {
      var curr = active.filter(function (e) { return e.id === selectedId; })[0];
      var cd   = calcCd(curr.utcMs);
      var dEl  = document.getElementById('d-d');
      if (dEl && cd) {
        dEl.textContent                               = pad2(cd.d);
        document.getElementById('d-h').textContent   = pad2(cd.h);
        document.getElementById('d-m').textContent   = pad2(cd.m);
        document.getElementById('d-s').textContent   = pad2(cd.s);
      }
      active.filter(function (e) { return e.id !== selectedId; }).forEach(function (e) {
        var el = document.getElementById('m-' + e.id);
        if (el) el.textContent = compact(e.utcMs);
      });
    }

    // Re-render minis if the active-exam set has changed
    var curMiniIds = Array.prototype.map.call(
      document.querySelectorAll('.mini-card'),
      function (c) { return c.dataset.id; }
    );
    var expMiniIds = active
      .filter(function (e) { return e.id !== selectedId; })
      .map(function (e) { return e.id; });
    if (curMiniIds.join(',') !== expMiniIds.join(',')) {
      renderMinis(active);
    }
  }

  /* ── Init ───────────────────────────────────────────────────────────────── */

  function init() {
    var active = getActive();

    if (!active.length) {
      renderMain(null, false);
      return;
    }

    selectedId = resolveId(active);
    saveId(selectedId);

    var exam = active.filter(function (e) { return e.id === selectedId; })[0];
    renderMain(exam, false);
    renderMinis(active);

    timer = setInterval(tick, 1000);
  }

  init();
}());
</script>

</body>
</html>
