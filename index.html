<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yaeesh.dev</title>
  <meta name="description" content="Yaeesh's personal site — something's coming.">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:          #080d1a;
      --surface:     #111b2e;
      --border:      #1c2b44;
      --text:        #e2e8f0;
      --text-muted:  #4e6278;
      --text-sub:    #94a3b8;
      --teal:        #2dd4bf;
      --blue:        #60a5fa;
      --amber:       #f59e0b;
    }

    html {
      height: 100%;
      cursor: none;
    }

    body {
      min-height: 100%;
      min-height: 100dvh;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% 0%,   rgba(45,212,191,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 80% 100%, rgba(96,165,250,0.05) 0%, transparent 60%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Main content ────────────────────────────────────────── */

    .center {
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .name {
      font-size: clamp(3rem, 10vw, 6.5rem);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1;
      color: var(--text);
      margin-bottom: 0.75rem;
    }

    .tagline {
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      color: var(--text-muted);
      letter-spacing: 0.01em;
      margin-bottom: 3rem;
    }

    /* ── Links ───────────────────────────────────────────────── */

    .links {
      display: flex;
      gap: 0.85rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Exam Countdown — primary/amber */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.65rem 1.3rem;
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 8px;
      color: var(--amber);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-decoration: none;
      transition: background 0.18s, border-color 0.18s, transform 0.15s;
    }
    .btn-primary:hover {
      background: rgba(245,158,11,0.14);
      border-color: rgba(245,158,11,0.55);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }

    /* GitHub — secondary/ghost */
    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.65rem 1.3rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-sub);
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.15s;
    }
    .btn-ghost:hover {
      background: var(--surface);
      border-color: rgba(96,165,250,0.3);
      color: var(--text);
      transform: translateY(-1px);
    }
    .btn-ghost:active { transform: translateY(0); }

    /* ── Cursor ──────────────────────────────────────────────── */

    .cursor-dot {
      width: 7px;
      height: 7px;
      background: var(--teal);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      will-change: left, top;
    }

    .cursor-ring {
      width: 30px;
      height: 30px;
      border: 1.5px solid rgba(96,165,250,0.45);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9998;
      will-change: left, top;
      transition: width 0.2s, height 0.2s, border-color 0.2s;
    }

    /* Enlarge ring when hovering a link (class toggled by JS) */
    .cursor-ring.hovered {
      width: 44px;
      height: 44px;
      border-color: rgba(245,158,11,0.55);
    }

    /* Hide on touch-only devices */
    @media (hover: none) {
      .cursor-dot, .cursor-ring { display: none; }
      html { cursor: auto; }
    }
  </style>
</head>
<body>

<div class="center">
  <h1 class="name">Yaeesh</h1>
  <p class="tagline">Something's coming.</p>
  <div class="links">
    <a href="/exam-countdown" class="btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      Exam Countdown
    </a>
    <a href="https://github.com/mYaeesh" class="btn-ghost" target="_blank" rel="noopener noreferrer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
      </svg>
      GitHub
    </a>
  </div>
</div>

<div class="cursor-dot"  id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<script>
(function () {
  var dot  = document.getElementById('cursorDot');
  var ring = document.getElementById('cursorRing');

  // Start off-screen so they don't flash at (0,0) on load
  var mx = -200, my = -200;
  var rx = -200, ry = -200;

  // Dot follows instantly
  document.addEventListener('mousemove', function (e) {
    mx = e.clientX;
    my = e.clientY;
    dot.style.left = mx + 'px';
    dot.style.top  = my + 'px';
  });

  // Ring lerps behind at ~12% each frame
  (function loop() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px';
    ring.style.top  = ry + 'px';
    requestAnimationFrame(loop);
  }());

  // Enlarge ring when hovering interactive elements
  document.querySelectorAll('a').forEach(function (el) {
    el.addEventListener('mouseenter', function () { ring.classList.add('hovered'); });
    el.addEventListener('mouseleave', function () { ring.classList.remove('hovered'); });
  });
}());
</script>

</body>
</html>
